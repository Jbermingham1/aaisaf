title: AAISAF
description: Australian AI Security Assessment Framework
theme: just-the-docs
url: "https://jbermingham1.github.io"
baseurl: "/aaisaf"

# Repository
aux_links:
  "GitHub":
    - "https://github.com/Jbermingham1/aaisaf"

aux_links_new_tab: true

# Footer
footer_content: "AAISAF is licensed under <a href=\"https://creativecommons.org/licenses/by-sa/4.0/\">CC BY-SA 4.0</a> by <a href=\"https://github.com/Jbermingham1\">Bifrost Labs</a>."

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Navigation
nav_sort: case_insensitive

# Colour scheme
color_scheme: dark

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# External navigation links
nav_external_links:
  - title: "OWASP LLM Top 10"
    url: "https://genai.owasp.org"
  - title: "MITRE ATLAS"
    url: "https://atlas.mitre.org"

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  critical:
    title: Critical
    color: purple

# Kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
